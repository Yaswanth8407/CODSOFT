<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elite Landing Page</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }
      body {
        background: #020617;
        color: #fff;
        overflow: hidden;
      }

      .noise {
        position: fixed;
        background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2"/></filter><rect width="100%" height="100%" filter="url(%23n)"/></svg>');
      }

      header {
        position: fixed;
        width: 100%;
        top: 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 18px 60px;
        z-index: 10;
        background: rgba(2, 6, 23, 0.6);
        backdrop-filter: blur(12px);
      }
      header h1 {
        font-weight: 800;
        letter-spacing: 1px;
      }
      nav a {
        margin-left: 26px;
        color: #94a3b8;
        text-decoration: none;
        position: relative;
      }
      .nav-line {
        position: absolute;
        left: 0;
        bottom: -6px;
        height: 2px;
        width: 0;
        background: linear-gradient(90deg, #38bdf8, #6366f1);
        transition: 0.3s;
      }
      nav a:hover {
        color: #fff;
      }
      nav a:hover .nav-line {
        width: 100%;
      }

      .hero {
        height: 100vh;
        display: grid;
        grid-template-columns: 1.5fr 1fr;
        align-items: center;
        padding: 0 60px;
        position: relative;
      }

      .blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(120px);
        opacity: 0.8;
        animation: float 10s ease-in-out infinite alternate;
      }
      .blob.b1 {
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, #6366f1, #38bdf8);
        top: -10%;
        left: 40%;
      }
      .blob.b2 {
        width: 500px;
        height: 500px;
        background: radial-gradient(circle, #22c55e, #06b6d4);
        bottom: -20%;
        right: 10%;
        animation-duration: 12s;
      }
      @keyframes float {
        0% {
          transform: translateY(0);
        }
        100% {
          transform: translateY(60px);
        }
      }

      .hero-text {
        max-width: 560px;
        z-index: 2;
      }
      .hero-text h2 {
        font-size: 68px;
        font-weight: 800;
        line-height: 1.05;
        margin-bottom: 18px;
        background: linear-gradient(90deg, #fff, #c7d2fe, #38bdf8);
        background-clip: text;
        color: transparent;
      }
      .hero-text p {
        color: #94a3b8;
        margin-bottom: 28px;
      }

      .cta {
        display: flex;
        gap: 14px;
      }
      .btn {
        padding: 14px 30px;
        border: none;
        border-radius: 999px;
        background: linear-gradient(135deg, #6366f1, #38bdf8);
        color: #fff;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 10px 30px rgba(99, 102, 241, 0.5);
        transition: 0.25s;
      }
      .btn:hover {
        transform: translateY(-3px) scale(1.05);
      }
      .btn.alt {
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.15);
      }

      .mock {
        z-index: 2;
        border-radius: 24px;
        padding: 18px;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.08),
          rgba(255, 255, 255, 0.02)
        );
        border: 1px solid rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(18px);
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
      }
      .mock .bar {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }
      .d1 {
        background: #ef4444;
      }
      .d2 {
        background: #f59e0b;
      }
      .d3 {
        background: #22c55e;
      }
      .mock .content {
        height: 260px;
        border-radius: 14px;
        background: linear-gradient(135deg, #0b1220, #0a0f1a);
        position: relative;
        overflow: hidden;
      }
      .glow {
        position: absolute;
        inset: -30%;
        background: conic-gradient(
          from 0deg,
          #38bdf8,
          transparent,
          #6366f1,
          transparent
        );
        filter: blur(60px);
        opacity: 0.5;
        animation: spin 12s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .card-container {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 26px;
        padding: 110px 60px;
      }
      .card {
        background: rgba(255, 255, 255, 0.05);
        padding: 30px;
        border-radius: 22px;
        backdrop-filter: blur(14px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        transition: 0.35s;
        position: relative;
        overflow: hidden;
      }
      .card-glow {
        position: absolute;
        width: 220%;
        height: 220%;
        background: linear-gradient(120deg, transparent, #38bdf8, transparent);
        top: -60%;
        left: -60%;
        transform: rotate(25deg);
        opacity: 0;
        transition: 0.5s;
      }
      .card:hover .card-glow {
        opacity: 0.25;
      }
      .card:hover {
        transform: translateY(-16px) scale(1.03);
      }
      .card h3 {
        margin-bottom: 8px;
        font-size: 22px;
      }
      .card p {
        color: #94a3b8;
      }

      footer {
        padding: 40px;
        text-align: center;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <div class="noise"></div>

    <header>
      <h1>ELITE</h1>
      <nav>
        <a href="#"
          >Home
          <div class="nav-line"></div
        ></a>
        <a href="#"
          >Features
          <div class="nav-line"></div
        ></a>
        <a href="#"
          >Stats
          <div class="nav-line"></div
        ></a>
        <a href="#"
          >Contact
          <div class="nav-line"></div
        ></a>
      </nav>
    </header>

    <section class="hero">
      <div class="blob b1"></div>
      <div class="blob b2"></div>

      <div class="hero-text">
        <h2>Design That Feels Alive</h2>
        <p>
          Layered depth, motion, and glow — a landing experience that actually
          makes people stop scrolling.
        </p>
        <div class="cta">
          <button class="btn">Get Started</button>
          <button class="btn alt">Live Demo</button>
        </div>
      </div>

      <div class="mock">
        <div class="bar">
          <div class="dot d1"></div>
          <div class="dot d2"></div>
          <div class="dot d3"></div>
        </div>
        <div class="content">
          <div class="glow"></div>
        </div>
      </div>
    </section>
  </body>
</html>
