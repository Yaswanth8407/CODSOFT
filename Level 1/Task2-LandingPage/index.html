<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elite Landing Page</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="noise"></div>

    <header>
      <h1>ELITE</h1>
      <nav>
        <a href="#"
          >Home
          <div class="nav-line"></div
        ></a>
        <a href="#"
          >Features
          <div class="nav-line"></div
        ></a>
        <a href="#"
          >Stats
          <div class="nav-line"></div
        ></a>
        <a href="#"
          >Contact
          <div class="nav-line"></div
        ></a>
      </nav>
    </header>

    <section class="hero">
      <div class="blob b1"></div>
      <div class="blob b2"></div>

      <div class="hero-text">
        <h2>Design That Feels Alive</h2>
        <p>
          Layered depth, motion, and glow — a landing experience that actually
          makes people stop scrolling.
        </p>
        <div class="cta">
          <button class="btn">Get Started</button>
          <button class="btn alt">Live Demo</button>
        </div>
      </div>

      <div class="mock">
        <div class="bar">
          <div class="dot d1"></div>
          <div class="dot d2"></div>
          <div class="dot d3"></div>
        </div>
        <div class="content">
          <div class="glow"></div>
        </div>
      </div>
    </section>
  </body>
</html>
