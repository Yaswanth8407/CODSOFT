<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&family=Fredoka:wght@300..700&family=Orbitron:wght@400..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="cal">
      <div class="label">
        <div class="op">+</div>
        <div class="num">999</div>
      </div>
      <div class="btns">
        <button class="btn" id="sq">x<sup>2</sup></button>
        <button class="btn" id="zero">0</button>
        <button class="btn" id="dblzero">00</button>
        <button class="btn" id="plus">+</button>
        <button class="btn" id="one">1</button>
        <button class="btn" id="two">2</button>
        <button class="btn" id="three">3</button>
        <button class="btn" id="minus">-</button>
        <button class="btn" id="four">4</button>
        <button class="btn" id="five">5</button>
        <button class="btn" id="six">6</button>
        <button class="btn" id="multiply">*</button>
        <button class="btn" id="seven">7</button>
        <button class="btn" id="eight">8</button>
        <button class="btn" id="nine">9</button>
        <button class="btn" id="divide">/</button>
        <button class="btn" id="dot">•</button>
        <button class="btn" id="del">del</button>
        <button class="btn" id="reset">Reset</button>
        <button class="btn" id="equal">=</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
